<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplikasi Notes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Catatan Mpruy</h1>

      <form id="noteForm">
        <input type="hidden" id="noteId" />

        <input type="text" id="judul" placeholder="Judul Catatan" required />

        <textarea id="isi" placeholder="Isi catatan..." required></textarea>

        <button type="submit" id="saveBtn">Simpan Catatan</button>
        <button type="button" id="cancelBtn" style="display: none">
          Batal Edit
        </button>
      </form>

      <div id="notesList"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
